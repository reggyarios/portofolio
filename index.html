<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reggy Arauna Aritonang | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white text-neutral-900 dark:bg-black dark:text-white font-sans antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black transition-colors duration-300">

    <nav class="p-6 max-w-5xl mx-auto flex justify-between items-center border-b border-neutral-200 dark:border-neutral-800">
        <div class="text-xl font-extrabold tracking-widest uppercase">RAA.</div>
        <button id="theme-toggle" class="text-xs font-semibold tracking-widest uppercase text-neutral-500 hover:text-black dark:hover:text-white transition-colors focus:outline-none">
            Toggle Theme
        </button>
    </nav>

    <header class="max-w-5xl mx-auto px-6 py-24 flex flex-col justify-center min-h-[50vh]">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 leading-tight">
            Building Immersive <br> 
            <span class="text-neutral-400 dark:text-neutral-500">Digital Worlds.</span>
        </h1>
        <p class="text-lg text-neutral-600 dark:text-neutral-400 max-w-2xl leading-relaxed font-light">
            Professional Game Developer & Environment Builder. Specializing in Lua scripting, 3D reconstruction pipelines, and high-fidelity interactive experiences.
        </p>
    </header>

    <section class="max-w-5xl mx-auto px-6 pb-32">
        <div class="flex justify-between items-end mb-10">
            <h2 class="text-sm font-semibold tracking-widest uppercase text-neutral-500 dark:text-neutral-400">Selected Works</h2>
        </div>
        
        <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <p class="text-neutral-500 animate-pulse text-sm tracking-widest uppercase">Loading projects...</p>
        </div>
    </section>

    <footer class="border-t border-neutral-200 dark:border-neutral-800">
        <div class="max-w-5xl mx-auto px-6 py-12 flex flex-col md:flex-row justify-between items-center text-xs text-neutral-500 uppercase tracking-widest">
            <p>&copy; 2026 RAA.</p>
            <div class="flex gap-6 mt-4 md:mt-0">
                <a href="https://github.com/reggyarios" target="_blank" class="hover:text-black dark:hover:text-white transition-colors">GitHub</a>
                <a href="mailto:reggyarauna7@gmail.com" class="hover:text-black dark:hover:text-white transition-colors">Email</a>
            </div>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
