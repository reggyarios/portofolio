<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Portfolio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white text-neutral-900 dark:bg-black dark:text-white font-sans antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black transition-colors duration-300">

    <nav class="p-6 max-w-4xl mx-auto flex justify-between items-center border-b border-neutral-200 dark:border-neutral-800">
        <a href="/index.html" class="text-xs font-semibold tracking-widest uppercase text-neutral-500 hover:text-black dark:hover:text-white transition-colors flex items-center gap-2">
            <span>&larr;</span> Back
        </a>
        <button id="theme-toggle" class="text-xs font-semibold tracking-widest uppercase text-neutral-500 hover:text-black dark:hover:text-white transition-colors focus:outline-none">
            Toggle Theme
        </button>
    </nav>

    <main id="project-detail-container" class="max-w-4xl mx-auto px-6 py-16">
        <p class="text-neutral-500 animate-pulse text-sm tracking-widest uppercase text-center mt-20">Loading details...</p>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
