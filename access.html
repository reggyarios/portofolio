<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen">

    <div id="login-screen" class="flex items-center justify-center h-screen px-6">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 w-full max-w-md">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Admin Access</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" id="email" class="w-full bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="max-w-5xl mx-auto px-6 py-12" style="display: none;">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-bold text-white">Project Manager</h1>
            <button id="logout-btn" class="text-sm text-red-400 hover:text-red-300 transition">Logout</button>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8">
            <h2 class="text-xl font-bold text-white mb-4">Add New Portfolio Item</h2>
            <form id="add-project-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="proj-title" placeholder="Project Title" class="bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
                    <input type="text" id="proj-image" placeholder="Image URL" class="bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
                    <input type="text" id="proj-tech" placeholder="Tech Stack (e.g. Lua, Roblox Studio)" class="bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
                    
                    <input type="text" id="proj-demo" placeholder="Demo/Play Link (Optional)" class="bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                    
                    <textarea id="proj-desc" placeholder="Project Description" class="bg-gray-900 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500 md:col-span-2 h-32" required></textarea>
                </div>
                <button type="submit" class="mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition">
                    Save Project
                </button>
            </form>
        </div>

        <div>
            <h2 class="text-xl font-bold text-white mb-4">Existing Projects</h2>
            <div id="projects-list" class="space-y-2">
                <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h3 class="font-bold text-white">THE DOME</h3>
                        <p class="text-sm text-gray-400 truncate w-full max-w-md">Social hangout experience...</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1 rounded text-sm transition">Edit</button>
                        <button class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white px-3 py-1 rounded text-sm transition">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
